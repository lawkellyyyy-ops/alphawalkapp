<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="alphawalk">
  <defs>
    <!-- TILE · rounded dark square, holds the orb on light and dark tabs alike -->
    <radialGradient id="tile" cx="50%" cy="42%" r="64%">
      <stop offset="0%"  stop-color="#0a1334"/>
      <stop offset="62%" stop-color="#060c26"/>
      <stop offset="100%" stop-color="#03061a"/>
    </radialGradient>

    <!-- ATMOSPHERIC HALO · soft cyan bloom outside the sphere -->
    <radialGradient id="halo" cx="50%" cy="52%" r="50%">
      <stop offset="0%"  stop-color="#5fe8ff" stop-opacity=".58"/>
      <stop offset="42%" stop-color="#5fe8ff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#5fe8ff" stop-opacity="0"/>
    </radialGradient>

    <!-- SPHERE BODY · the orb proper · simple radial · reads at 16px -->
    <radialGradient id="body" cx="38%" cy="32%" r="78%">
      <stop offset="0%"   stop-color="#f4f8ff" stop-opacity=".95"/>
      <stop offset="22%"  stop-color="#cfe7ff" stop-opacity=".88"/>
      <stop offset="48%"  stop-color="#7cc9ff" stop-opacity=".82"/>
      <stop offset="78%"  stop-color="#2b5dff" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity=".95"/>
    </radialGradient>

    <!-- MERIDIAN · one quiet equator line so the orb reads as a sphere, not a disc -->
    <linearGradient id="meridian" x1="14" y1="50" x2="86" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#cfe7ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#f4f8ff" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#cfe7ff" stop-opacity="0"/>
    </linearGradient>

    <!-- SUBSURFACE DARK · weight on bottom-right for dimension -->
    <radialGradient id="deep" cx="64%" cy="78%" r="62%">
      <stop offset="0%"   stop-color="#02030a" stop-opacity=".55"/>
      <stop offset="62%"  stop-color="#02030a" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#02030a" stop-opacity="0"/>
    </radialGradient>

    <!-- SPECULAR CATCHLIGHT · top-left, the paperweight glint -->
    <radialGradient id="spec" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity=".68"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 1 · TILE · rounded square so favicon reads as an app icon -->
  <rect width="100" height="100" rx="22" fill="url(#tile)"/>

  <!-- 2 · HALO · outer cyan bloom · holds the orb in the void -->
  <circle cx="50" cy="52" r="44" fill="url(#halo)"/>

  <!-- 3 · ORB BODY · single sphere · keeps silhouette clean at 16px -->
  <circle cx="50" cy="50" r="34" fill="url(#body)"/>

  <!-- 4 · MERIDIAN · one quiet equator hairline so the form reads as 3D -->
  <line x1="16" y1="50" x2="84" y2="50" stroke="url(#meridian)" stroke-width=".9"/>

  <!-- 5 · SUBSURFACE WEIGHT · bottom-right dimming -->
  <circle cx="50" cy="50" r="34" fill="url(#deep)"/>

  <!-- 6 · COOL SKY-BOUNCE · a thin reflection band along the bottom -->
  <ellipse cx="54" cy="70" rx="14" ry="1.4" fill="#7cc9ff" opacity=".32"/>

  <!-- 7 · SPECULAR CATCHLIGHT · single soft highlight, plus a tight hot spot -->
  <ellipse cx="38" cy="34" rx="12" ry="6.5" fill="url(#spec)" opacity=".82" transform="rotate(-28 38 34)"/>
  <circle cx="34" cy="32" r="2" fill="#ffffff" opacity=".96"/>

  <!-- 8 · RIM · faint cyan outline so the sphere holds at the smallest sizes -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#cfe7ff" stroke-width=".55" stroke-opacity=".42"/>

  <!-- 9 · GROUND SHADOW · soft ellipse below the sphere -->
  <ellipse cx="50" cy="88" rx="20" ry="1.4" fill="#02030a" opacity=".55"/>
</svg>
